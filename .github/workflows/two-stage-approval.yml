name: Two Job Pipeline with Manual Approval

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  first-job:
    name: First Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run first job tasks
        run: echo "First job completed successfully."

  second-job:
    name: Second Job (Manual Approval)
    runs-on: ubuntu-latest
    needs: first-job
    environment:
      name: manual-approval
    steps:
      - name: Run second job tasks
        run: echo "Second job started after manual approval."
