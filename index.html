<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="login-overlay" class="login-overlay" aria-modal="true" role="dialog" aria-label="Login">
        <div class="login-card panel">
            <p class="eyebrow">Student Management App</p>
            <h1 class="login-title">Sign in</h1>
            <form id="login-form" class="login-form" novalidate>
                <label>
                    <span>Username</span>
                    <input id="login-username" name="username" type="text" placeholder="Enter username" autocomplete="username" required>
                </label>
                <label>
                    <span>Password</span>
                    <input id="login-password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
                </label>
                <button type="submit">Sign in</button>
            </form>
            <p id="login-status" class="form-status" aria-live="polite"></p>
            <p class="login-hint">Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>
    </div>

    <main id="app-content" class="app-shell" hidden>
        <section class="panel hero-panel">
            <p class="eyebrow">Student Management App</p>
            <h1>Track student records locally.</h1>
            <p class="hero-copy">
                Add students with a simple form and keep the list persisted in your browser using localStorage.
            </p>
            <button id="logout-btn" class="logout-btn" type="button">Sign out</button>
        </section>

        <section class="panel form-panel">
            <h2>Add Student</h2>
            <form id="student-form" class="student-form">
                <label>
                    <span>Name</span>
                    <input id="student-name" name="name" type="text" placeholder="Enter student name" required>
                </label>

                <label>
                    <span>Student ID</span>
                    <input id="student-id" name="studentId" type="text" placeholder="Enter student ID" required>
                </label>

                <label>
                    <span>Course</span>
                    <input id="student-course" name="course" type="text" placeholder="Enter course name" required>
                </label>

                <button type="submit">Add Student</button>
            </form>
            <p id="form-status" class="form-status" aria-live="polite"></p>
        </section>

        <section class="panel list-panel">
            <div class="list-header">
                <h2>Student List</h2>
                <span id="student-count" class="student-count">0 students</span>
            </div>
            <div id="student-list" class="student-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
